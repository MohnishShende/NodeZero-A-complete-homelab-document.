server:
 verbosity: 1
 interface: 127.0.0.1
 port: 5335
 do-ip4: yes
 do-udp: yes
 do-tcp: yes
 access-control: 127.0.0.0/8 allow
 root-hints: "/var/lib/unbound/root.hints"
 hide-identity: yes
 hide-version: yes
 harden-glue: yes
 harden-dnssec-stripped: yes
 use-caps-for-id: yes
 edns-buffer-size: 1232
 prefetch: yes
 num-threads: 2

server:
 auto-trust-anchor-file: "/var/lib/unbound/root.key"

remote-control:
 control-enable: yes
 control-interface: /run/unbound.ctl
